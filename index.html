<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#10243d">
<link rel="manifest" href="manifest.webmanifest">
<title>HDM ToDoアプリ</title>
<style>
:root {
  --ink:#182230;
  --muted:#657487;
  --line:#d8e0ea;
  --paper:#ffffff;
  --bg:#eef3f8;
  --navy:#10243d;
  --blue:#246bfe;
  --green:#11845b;
  --amber:#b75e00;
  --red:#c83131;
  --cyan:#0f9fb5;
  --shadow:0 14px 34px rgba(22,34,51,.09);
  --radius:8px;
}
*{box-sizing:border-box}
html,body{min-height:100%}
body{
  margin:0;
  color:var(--ink);
  background:var(--bg);
  font-family:"Hiragino Sans","Yu Gothic",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  letter-spacing:0;
}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.app{min-height:100vh;display:grid;grid-template-columns:280px 1fr}
.side{
  background:var(--navy);
  color:#fff;
  padding:22px 18px;
  position:sticky;
  top:0;
  height:100vh;
  overflow:auto;
}
.brand{font-size:12px;color:#7dd3fc;font-weight:800;letter-spacing:1px}
.side h1{font-size:24px;line-height:1.22;margin:6px 0 18px}
.nav{display:grid;gap:8px;margin:18px 0}
.nav button{
  border:0;
  border-radius:var(--radius);
  padding:12px 12px;
  background:rgba(255,255,255,.08);
  color:#d7e4f4;
  text-align:left;
  font-weight:800;
}
.nav button.active{background:#fff;color:var(--navy)}
.side-card{
  border:1px solid rgba(255,255,255,.16);
  border-radius:var(--radius);
  padding:12px;
  margin-top:14px;
  background:rgba(255,255,255,.06);
}
.side-card b{display:block;margin-bottom:4px}
.side-card p{margin:0;color:#cbd8e6;font-size:13px;line-height:1.55}
.main{padding:22px;min-width:0}
.topbar{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
  margin-bottom:16px;
}
.kicker{font-size:12px;color:var(--blue);font-weight:900;letter-spacing:1px}
h2{font-size:28px;line-height:1.2;margin:3px 0 4px}
.sub{color:var(--muted);font-size:14px;line-height:1.6}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.btn{
  border:0;
  border-radius:var(--radius);
  padding:10px 13px;
  background:var(--blue);
  color:#fff;
  font-weight:900;
}
.btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.green{background:var(--green)}
.btn.red{background:var(--red)}
.btn.small{padding:7px 9px;font-size:12px}
.grid{display:grid;gap:14px}
.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.panel{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px;
}
.stat .label{color:var(--muted);font-size:12px;font-weight:800}
.stat .num{font-size:32px;font-weight:950;line-height:1.1;margin-top:6px}
.stat .note{font-size:12px;color:var(--muted);margin-top:4px}
.goal-box{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:14px;
}
.goal{
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:13px;
  background:#f8fbff;
}
.goal b{display:block;margin-bottom:5px}
.goal p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}
.goal.slim{background:#fff;padding:10px 12px}
.goal.slim p{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.section-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin:22px 0 10px;
}
.section-title h3{margin:0;font-size:18px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap}
.toolbar input,.toolbar select{
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:9px 10px;
  background:#fff;
  min-width:150px;
}
.task-list{display:grid;gap:10px}
.task{
  background:#fff;
  border:1px solid var(--line);
  border-left:6px solid var(--blue);
  border-radius:var(--radius);
  padding:14px;
  display:grid;
  gap:10px;
}
.task.overdue{border-left-color:var(--red)}
.task.soon{border-left-color:var(--amber)}
.task.done{border-left-color:var(--green)}
.task-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}
.task h4{font-size:17px;margin:0 0 4px}
.task p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{
  display:inline-flex;
  align-items:center;
  border-radius:999px;
  padding:4px 8px;
  font-size:12px;
  font-weight:900;
  background:#edf2f7;
  color:#425466;
  white-space:nowrap;
}
.badge.blue{background:#e7f0ff;color:#1556d6}
.badge.green{background:#def7eb;color:#087044}
.badge.amber{background:#fff0d8;color:#9a4c00}
.badge.red{background:#ffe1e1;color:#a92323}
.badge.cyan{background:#def8fb;color:#087989}
.badge.owner-saito{background:#e6f0ff;color:#1556d6}
.badge.owner-ie{background:#e5f8ef;color:#087044}
.badge.owner-hirose{background:#fff0d8;color:#9a4c00}
.badge.owner-all{background:#edf2f7;color:#425466}
.progress-wrap{display:grid;grid-template-columns:1fr 56px;gap:10px;align-items:center}
.progress{
  height:10px;
  border-radius:999px;
  background:#e8eef5;
  overflow:hidden;
}
.progress span{display:block;height:100%;background:var(--blue);border-radius:999px}
.task.done .progress span{background:var(--green)}
.task-actions{display:flex;gap:7px;flex-wrap:wrap}
.gantt-panel{
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}
.gantt-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:13px 14px;
  border-bottom:1px solid var(--line);
  background:#fbfcfe;
}
.gantt-head h3{margin:0;font-size:18px}
.gantt-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.gantt-controls input{
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:8px 9px;
  background:#fff;
  font-weight:900;
}
.gantt-scroll{overflow:auto}
.gantt-grid{
  min-width:1120px;
  display:grid;
  grid-template-columns:150px repeat(var(--days), minmax(34px,1fr));
}
.gantt-corner,.gantt-day,.gantt-owner,.gantt-cell{
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.gantt-corner{
  position:sticky;
  left:0;
  z-index:4;
  background:#f4f7fb;
  padding:10px;
  font-weight:950;
}
.gantt-day{
  background:#f4f7fb;
  min-height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:900;
  color:#263445;
}
.gantt-day.today{background:#e7f0ff;color:#1556d6}
.gantt-owner{
  position:sticky;
  left:0;
  z-index:3;
  background:#fff;
  min-height:150px;
  padding:12px 10px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:6px;
  font-weight:950;
  border-left:5px solid var(--owner-color, var(--line));
}
.gantt-owner span{color:var(--muted);font-size:12px;font-weight:800}
.gantt-lane{
  grid-column:2 / -1;
  position:relative;
  min-height:150px;
  background:
    repeating-linear-gradient(90deg, transparent 0, transparent calc((100% / var(--days)) - 1px), rgba(216,224,234,.9) calc((100% / var(--days)) - 1px), rgba(216,224,234,.9) calc(100% / var(--days))),
    #fff;
  border-bottom:1px solid var(--line);
}
.gantt-bar{
  position:absolute;
  top:calc(10px + var(--lane) * 26px);
  left:calc((var(--start) - 1) * (100% / var(--days)) + 3px);
  width:calc(var(--span) * (100% / var(--days)) - 6px);
  min-width:42px;
  height:22px;
  border-radius:5px;
  background:var(--owner-color, var(--blue));
  color:#fff;
  display:flex;
  align-items:center;
  gap:7px;
  padding:0 8px;
  font-size:13px;
  font-weight:950;
  overflow:hidden;
  white-space:nowrap;
  box-shadow:0 4px 12px rgba(24,34,48,.16);
}
.gantt-bar.done{background:var(--green)}
.gantt-bar.blocked,.gantt-bar.overdue{background:var(--red)}
.gantt-bar.soon{background:var(--amber)}
.gantt-bar.shared{background:#58677a}
.gantt-bar b{overflow:hidden;text-overflow:ellipsis}
.gantt-bar small{opacity:.9;font-weight:900;flex:0 0 auto}
.gantt-empty{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-weight:800;
}
.ai-list{display:grid;gap:10px}
.ai-card{
  border:1px solid var(--line);
  border-left:5px solid var(--blue);
  border-radius:var(--radius);
  padding:12px;
  background:#fff;
}
.ai-card.danger{border-left-color:var(--red)}
.ai-card.warn{border-left-color:var(--amber)}
.ai-card.good{border-left-color:var(--green)}
.ai-card b{display:block;margin-bottom:4px}
.ai-card p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}
.timeline{display:grid;gap:10px}
.event{
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:12px;
}
.event b{display:block;margin-bottom:4px}
.event p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}
.people{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.person h4{margin:0 0 7px}
.person-row{display:flex;justify-content:space-between;border-top:1px solid var(--line);padding-top:8px;margin-top:8px;color:var(--muted);font-size:13px}
.modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(8,17,30,.62);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
  padding:16px;
}
.modal-backdrop.show{display:flex}
.modal{
  width:min(760px,100%);
  max-height:90vh;
  overflow:auto;
  background:#fff;
  border-radius:var(--radius);
  box-shadow:0 28px 80px rgba(0,0,0,.28);
}
.modal-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
  border-bottom:1px solid var(--line);
  padding:15px 16px;
}
.modal-head h3{margin:0;font-size:20px}
.modal-body{padding:16px;display:grid;gap:12px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:12px;font-weight:900;color:var(--muted);display:grid;gap:5px}
input,select,textarea{
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:10px;
  background:#fff;
  color:var(--ink);
}
textarea{min-height:88px;resize:vertical}
.full{grid-column:1/-1}
.detail-grid{display:grid;grid-template-columns:1fr 320px;gap:14px}
.log-list{display:grid;gap:8px}
.log{
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:10px;
  background:#f9fbfd;
}
.log b{font-size:13px}
.log p{margin:4px 0 0;color:var(--muted);font-size:13px;line-height:1.5}
.attach-list{display:grid;gap:6px}
.attach{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:8px;
  font-size:13px;
}
.empty{
  color:var(--muted);
  border:1px dashed var(--line);
  border-radius:var(--radius);
  padding:20px;
  text-align:center;
  background:#fff;
}
.mobile-tabs{display:none}
@media (max-width:900px){
  .app{display:block}
  .side{position:relative;height:auto;padding:16px}
  .nav{display:none}
  .main{padding:14px}
  .topbar{display:grid}
  .actions{justify-content:flex-start}
  .grid.cols-4,.grid.cols-3,.people,.goal-box,.detail-grid,.form-grid{grid-template-columns:1fr}
  .gantt-grid{min-width:980px;grid-template-columns:112px repeat(var(--days), minmax(31px,1fr))}
  .gantt-owner{min-height:136px}
  .gantt-lane{min-height:136px}
  .gantt-bar{font-size:12px}
  .mobile-tabs{
    display:flex;
    gap:6px;
    overflow:auto;
    padding:10px 0;
  }
  .mobile-tabs button{
    white-space:nowrap;
    border:1px solid var(--line);
    border-radius:999px;
    padding:8px 11px;
    background:#fff;
    font-weight:900;
  }
  .mobile-tabs button.active{background:var(--navy);color:#fff}
}
</style>
</head>

    <section id="view-people" class="view" hidden></section>
    <section id="view-timeline" class="view" hidden></section>
    <section id="view-settings" class="view" hidden></section>
  </main>
</div>

<div class="modal-backdrop" id="modal">

    <div class="modal-head">
      <h3 id="modalTitle">タスク</h3>
      <button class="btn secondary small" id="closeModal">閉じる</button>

</div>

let state = load();

let selectedMonth = todayISO().slice(0,7);
let cloudStatus = IS_FILE_ORIGIN ? "公開URLで同期" : "ローカル保存";
let cloudSaveTimer;
let lastCloudUpdatedAt = "";

function load(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(seedData));
    return structuredClone(seedData);
  }
  try { return normalizeState(JSON.parse(raw)); } catch(e) { return structuredClone(seedData); }
}
function normalizeState(data){
  data.goals = data.goals || structuredClone(seedData.goals);
  data.goals.months = data.goals.months || {};
  if(data.goals.month && !data.goals.months["2026-06"]) data.goals.months["2026-06"] = data.goals.month;
  data.tasks = (data.tasks || []).map(t => ({
    ...t,
    owner:normalizeName(t.owner),
    start:t.start || t.createdAt || t.due || todayISO(),
    logs:(t.logs || []).map(l => ({...l, by:normalizeName(l.by)}))
  }));
  return data;
}
function normalizeName(name){
  return nameAliases[name] || name;
}
function save(){
  state = normalizeState(state);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  render();
  queueCloudSave();
}
function cloudHeaders(extra = {}){
  return {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`,
    "Content-Type":"application/json",
    ...extra
  };
}
function cloudEndpoint(path){
  return `${SUPABASE_URL}/rest/v1/${path}`;
}
function setCloudStatus(status){
  cloudStatus = status;
  const el = document.getElementById("cloudStatus");
  if(el) el.textContent = status;
}
async function loadCloudState(){
  if(IS_FILE_ORIGIN){
    setCloudStatus("公開URLで同期");
    return;
  }
  setCloudStatus("同期確認中");
  try{
    const res = await fetch(cloudEndpoint(`app_state?id=eq.${CLOUD_STATE_ID}&select=data,updated_at`), {
      headers: cloudHeaders()
    });
    if(!res.ok) throw new Error(await res.text());
    const rows = await res.json();
    const cloudData = rows[0]?.data;
    lastCloudUpdatedAt = rows[0]?.updated_at || lastCloudUpdatedAt;
    if(cloudData?.goals && Array.isArray(cloudData?.tasks)){
      state = normalizeState(cloudData);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setCloudStatus("クラウド同期済み");
      render();
      return;
    }
    await saveCloudState();
    setCloudStatus("クラウド初期化済み");
  }catch(error){
    console.warn("Cloud load failed", error);
    setCloudStatus("クラウド未接続");
  }
}
function queueCloudSave(){
  if(IS_FILE_ORIGIN){
    setCloudStatus("公開URLで同期");
    return;
  }
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(saveCloudState, 500);
}
async function saveCloudState(){
  if(IS_FILE_ORIGIN){
    setCloudStatus("公開URLで同期");
    return;
  }
  setCloudStatus("保存中");
  try{
    const res = await fetch(cloudEndpoint("app_state?on_conflict=id"), {
      method:"POST",
      headers: cloudHeaders({Prefer:"resolution=merge-duplicates,return=minimal"}),
      body: JSON.stringify({
        id:CLOUD_STATE_ID,
        data:state,
        updated_at:new Date().toISOString()
      })
    });
    if(!res.ok) throw new Error(await res.text());
    lastCloudUpdatedAt = new Date().toISOString();
    setCloudStatus("クラウド同期済み");
  }catch(error){
    console.warn("Cloud save failed", error);
    setCloudStatus("クラウド保存失敗");
  }
}
async function pollCloudState(){
  if(IS_FILE_ORIGIN || document.hidden) return;
  try{
    const res = await fetch(cloudEndpoint(`app_state?id=eq.${CLOUD_STATE_ID}&select=data,updated_at`), {
      headers: cloudHeaders()
    });
    if(!res.ok) throw new Error(await res.text());
    const rows = await res.json();
    const remoteUpdatedAt = rows[0]?.updated_at || "";
    const cloudData = rows[0]?.data;
    if(remoteUpdatedAt && remoteUpdatedAt !== lastCloudUpdatedAt && cloudData?.goals && Array.isArray(cloudData?.tasks)){
      lastCloudUpdatedAt = remoteUpdatedAt;
      state = normalizeState(cloudData);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setCloudStatus("クラウド同期済み");
      render();
    }
  }catch(error){
    console.warn("Cloud poll failed", error);
  }
}
function monthLabel(monthKey){
  const [y,m] = monthKey.split("-").map(Number);
  return `${y}年${m}月`;
}
function daysInMonth(monthKey){
  const [y,m] = monthKey.split("-").map(Number);
  return new Date(y, m, 0).getDate();
}
function monthBounds(monthKey){
  const days = daysInMonth(monthKey);
  return {start:`${monthKey}-01`, end:`${monthKey}-${String(days).padStart(2,"0")}`, days};
}
function overlapsMonth(task, monthKey){
  const bounds = monthBounds(monthKey);
  const start = task.start || task.createdAt || task.due;
  return start <= bounds.end && task.due >= bounds.start;
}
function monthTasks(monthKey = selectedMonth){
  return state.tasks.filter(t => overlapsMonth(t, monthKey));
}
function currentMonthGoal(){
  return state.goals.months?.[selectedMonth] || state.goals.month || "";
}
function dateDiff(due){
  const today = new Date(todayISO());
  const d = new Date(due);
  return Math.ceil((d - today) / 86400000);
}
function statusClass(task){
  if(task.status === "done") return "done";
  const diff = dateDiff(task.due);
  if(diff < 0) return "overdue";
  if(diff <= 5) return "soon";
  return "";
}
function escapeHtml(str=""){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
}
function ownerClass(owner){
  return ownerMeta[normalizeName(owner)]?.className || "";
}
function ownerColor(owner){
  return ownerMeta[normalizeName(owner)]?.color || "#246bfe";
}
function allLogs(){
  return state.tasks.flatMap(t => (t.logs || []).map(l => ({...l, task:t.title, owner:t.owner, taskId:t.id})))
    .sort((a,b) => String(b.date).localeCompare(String(a.date)));
}
function calcStats(tasks = state.tasks){
  const total = tasks.length;
  const done = tasks.filter(t => t.status === "done").length;
  const overdue = tasks.filter(t => t.status !== "done" && dateDiff(t.due) < 0).length;
  const soon = tasks.filter(t => t.status !== "done" && dateDiff(t.due) >= 0 && dateDiff(t.due) <= 5).length;
  const avg = total ? Math.round(tasks.reduce((sum,t)=>sum + Number(t.progress || 0),0) / total) : 0;
  return {total, done, overdue, soon, avg};
}
function aiInsights(){
  const insights = [];
  state.tasks.forEach(t => {
    const diff = dateDiff(t.due);
    const lastLog = (t.logs || []).slice().sort((a,b)=>String(b.date).localeCompare(String(a.date)))[0];
    const daysSinceUpdate = Math.ceil((new Date(todayISO()) - new Date(t.updatedAt || t.createdAt || todayISO())) / 86400000);
    if(t.status !== "done" && diff < 0){
      insights.push({level:"danger", title:`期限超過: ${t.title}`, text:`担当は${t.owner}。期限を${Math.abs(diff)}日過ぎています。進捗確認と次の一手の報告が必要です。`});
    } else if(t.status !== "done" && diff <= 5){
      insights.push({level:"warn", title:`期限まであと${diff}日: ${t.title}`, text:`担当は${t.owner}。現在の進捗は${t.progress}%です。今日できる作業と相談事項をログに残してください。`});
    }
    if(t.status !== "done" && daysSinceUpdate >= 3){
      insights.push({level:"warn", title:`更新が止まっています: ${t.title}`, text:`${daysSinceUpdate}日更新がありません。進んでいない理由、もしくは完了報告を入れてください。`});
    }
    if(t.status === "blocked"){
      insights.push({level:"danger", title:`相談必要: ${t.title}`, text:`担当は${t.owner}。止まっている理由を確認し、齊藤へ判断材料をまとめてください。`});
    }
    if(t.status === "done" && !t.managerCheck){
      insights.push({level:"good", title:`管理者確認待ち: ${t.title}`, text:`完了済みです。齊藤確認が終われば成果ログとして確定できます。`});
    }
    if(!lastLog && t.status !== "done"){
      insights.push({level:"warn", title:`ログ未登録: ${t.title}`, text:`作業したこと、考えたこと、相談したいことを1行でも残すと管理しやすくなります。`});
    }
  });
  if(!insights.length) insights.push({level:"good", title:"大きなアラートはありません", text:"期限と進捗は大きく崩れていません。次は成果ログと添付資料を残していきましょう。"});
  return insights;
}

function taskTimelineClass(task, owner){
  const classes = ["gantt-bar"];
  if(task.owner === "全員") classes.push("shared");
  if(task.status === "done") classes.push("done");
  if(task.status === "blocked") classes.push("blocked");
  if(task.status !== "done" && dateDiff(task.due) < 0) classes.push("overdue");
  else if(task.status !== "done" && dateDiff(task.due) <= 5) classes.push("soon");
  return classes.join(" ");
}
function taskTimelineStyle(task, owner, range, index){
  const colorOwner = task.owner === "全員" ? "全員" : owner;
  return `--start:${range.startDay};--span:${range.span};--lane:${index};--owner-color:${ownerColor(colorOwner)}`;
}
function timelineRange(task, monthKey){
  const bounds = monthBounds(monthKey);
  const start = task.start || task.createdAt || task.due;
  const visibleStart = start < bounds.start ? bounds.start : start;
  const visibleEnd = task.due > bounds.end ? bounds.end : task.due;
  const startDay = Number(visibleStart.slice(8,10));
  const endDay = Number(visibleEnd.slice(8,10));
  return {startDay, span:Math.max(1, endDay - startDay + 1)};
}
function ownerTimelineTasks(owner, monthKey){
  return monthTasks(monthKey)
    .filter(t => t.owner === owner || t.owner === "全員")
    .sort((a,b) => (a.start || a.createdAt || a.due).localeCompare(b.start || b.createdAt || b.due) || a.due.localeCompare(b.due))
    .slice(0,5);
}

    </div>
  `;
  document.getElementById("goalMonth").onchange = e => { selectedMonth = e.target.value; renderSettings(); };
  document.getElementById("goalMonthSelect").onchange = e => { selectedMonth = e.target.value; renderSettings(); };
}
function render(){
  renderNav();
  if(currentView === "dashboard") renderDashboard();
  if(currentView === "tasks") renderTasks();
  if(currentView === "ai") renderAi();
  if(currentView === "people") renderPeople();
  if(currentView === "timeline") renderTimeline();
  if(currentView === "settings") renderSettings();
}
function saveGoals(){
  const goalMonth = document.getElementById("goalMonth").value || selectedMonth;
  selectedMonth = goalMonth;
  state.goals.year = document.getElementById("yearGoal").value;
  state.goals.month = document.getElementById("monthGoal").value;
  state.goals.months = state.goals.months || {};
  state.goals.months[goalMonth] = document.getElementById("monthGoal").value;
  state.goals.note = document.getElementById("goalNote").value;
  save();
}
function openModal(title, html){
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = html;
  document.getElementById("modal").classList.add("show");
}
function closeModal(){ document.getElementById("modal").classList.remove("show"); }
function openNewTask(){
  openModal("タスク追加", taskForm());
  document.getElementById("saveTask").onclick = () => saveTask();
}
function taskForm(t = {}){
  return `<div class="form-grid">
    <label>タイトル<input id="taskTitle" value="${escapeHtml(t.title || "")}"></label>
    <label>担当<select id="taskOwner">${people.map(p=>`<option ${t.owner===p?"selected":""}>${p}</option>`).join("")}</select></label>
    <label>開始日<input id="taskStart" type="date" value="${t.start || t.createdAt || todayISO()}"></label>
    <label>期限<input id="taskDue" type="date" value="${t.due || todayISO()}"></label>
    <label>プロジェクト<input id="taskProject" value="${escapeHtml(t.project || "")}"></label>
    <label>優先度<select id="taskPriority">${Object.entries(priorityLabels).map(([k,v])=>`<option value="${k}" ${t.priority===k?"selected":""}>${v}</option>`).join("")}</select></label>
    <label>ステータス<select id="taskStatus">${Object.entries(statusLabels).map(([k,v])=>`<option value="${k}" ${t.status===k?"selected":""}>${v}</option>`).join("")}</select></label>
    <label>進捗<input id="taskProgress" type="number" min="0" max="100" value="${Number(t.progress || 0)}"></label>
    <label>齊藤確認<select id="taskCheck"><option value="false">未確認</option><option value="true" ${t.managerCheck?"selected":""}>確認済み</option></select></label>
    <label class="full">内容<textarea id="taskDescription">${escapeHtml(t.description || "")}</textarea></label>
    <div class="full actions" style="justify-content:flex-start"><button class="btn green" id="saveTask">保存</button></div>
  </div>`;
}
function saveTask(id){
  const data = {
    title: document.getElementById("taskTitle").value.trim(),
    owner: document.getElementById("taskOwner").value,
    start: document.getElementById("taskStart").value,
    due: document.getElementById("taskDue").value,
    project: document.getElementById("taskProject").value.trim(),
    priority: document.getElementById("taskPriority").value,
    status: document.getElementById("taskStatus").value,
    progress: Math.max(0, Math.min(100, Number(document.getElementById("taskProgress").value || 0))),
    managerCheck: document.getElementById("taskCheck").value === "true",
    description: document.getElementById("taskDescription").value.trim(),
    updatedAt: todayISO()
  };
  if(!data.title) return alert("タイトルを入力してください");
  if(data.start > data.due) return alert("開始日は期限より前にしてください");
  if(id){
    state.tasks = state.tasks.map(t => t.id === id ? {...t, ...data} : t);
  } else {
    state.tasks.push({id: crypto.randomUUID(), createdAt: todayISO(), logs:[], attachments:[], ...data});
  }
  closeModal();
  save();
}
function openTask(id){
  const t = state.tasks.find(x => x.id === id);
  if(!t) return;
  openModal(t.title, `<div class="detail-grid">
    <div>
      ${taskForm(t)}
      <div class="section-title"><h3>ログ</h3><button class="btn secondary small" onclick="openLog('${t.id}')">追加</button></div>
      <div class="log-list">${(t.logs||[]).length ? t.logs.map(l=>`<div class="log"><b>${escapeHtml(l.date)} / ${escapeHtml(l.by)} / ${escapeHtml(l.type)}</b><p>${escapeHtml(l.text)}</p></div>`).join("") : `<div class="empty">ログなし</div>`}</div>
    </div>
    <div>
      <div class="panel" style="box-shadow:none">
        <h3 style="margin-top:0">添付</h3>
        <div class="attach-list">${(t.attachments||[]).length ? t.attachments.map((a,i)=>`<div class="attach"><span>${escapeHtml(a.name)}</span><button class="btn secondary small" onclick="downloadAttachment('${t.id}',${i})">開く</button></div>`).join("") : `<div class="empty">添付なし</div>`}</div>
        <label style="margin-top:10px">資料・写真<input id="attachInput" type="file"></label>
        <button class="btn secondary small" style="margin-top:8px" onclick="addAttachment('${t.id}')">添付を保存</button>
      </div>
      <div class="panel" style="box-shadow:none;margin-top:12px">
        <h3 style="margin-top:0">AIメモ</h3>
        <p class="sub">${escapeHtml(taskAiMemo(t))}</p>
      </div>
    </div>
  </div>`);
  document.getElementById("saveTask").onclick = () => saveTask(id);
}
function taskAiMemo(t){
  const diff = dateDiff(t.due);
  if(t.status === "blocked") return "相談必要になっています。止まっている理由、判断してほしい内容、必要備品をログに残してください。";
  if(t.status === "done" && !t.managerCheck) return "完了済みです。齊藤確認を入れると成果ログとして確定できます。";
  if(diff < 0) return "期限を超過しています。今日中に現状と完了予定を共有してください。";
  if(diff <= 5) return `期限まであと${diff}日です。今日進める作業と不明点を明確にしましょう。`;
  return "順調に進めるため、作業した日は短くてもログを残してください。";
}
function openLog(id){
  const t = state.tasks.find(x => x.id === id);
  openModal("ログ追加", `<div class="form-grid">
    <label>日付<input id="logDate" type="date" value="${todayISO()}"></label>
    <label>記入者<select id="logBy">${people.filter(p=>p!=="全員").map(p=>`<option>${p}</option>`).join("")}</select></label>
    <label>種類<select id="logType"><option>進捗</option><option>相談</option><option>完了報告</option><option>備品確認</option><option>改善提案</option></select></label>
    <label>進捗更新<input id="logProgress" type="number" min="0" max="100" value="${Number(t.progress||0)}"></label>
    <label class="full">内容<textarea id="logText" placeholder="今日やったこと、止まっている理由、相談内容など"></textarea></label>
    <div class="full actions" style="justify-content:flex-start"><button class="btn green" onclick="saveLog('${id}')">保存</button></div>
  </div>`);
}
function saveLog(id){
  const t = state.tasks.find(x => x.id === id);
  t.logs = t.logs || [];
  const text = document.getElementById("logText").value.trim();
  if(!text) return alert("ログ内容を入力してください");
  t.logs.push({
    date: document.getElementById("logDate").value,
    by: document.getElementById("logBy").value,
    type: document.getElementById("logType").value,
    text
  });
  t.progress = Math.max(0, Math.min(100, Number(document.getElementById("logProgress").value || t.progress || 0)));
  if(t.progress >= 100) t.status = "done";
  else if(t.status === "todo") t.status = "doing";
  t.updatedAt = todayISO();
  closeModal();
  save();
}
function quickProgress(id, amount){
  const t = state.tasks.find(x => x.id === id);
  t.progress = Math.min(100, Number(t.progress || 0) + amount);
  t.status = t.progress >= 100 ? "done" : "doing";
  t.updatedAt = todayISO();
  t.logs = t.logs || [];
  t.logs.push({date:todayISO(), by:"齊藤", type:"進捗", text:`進捗を${t.progress}%に更新。`});
  save();
}
function markDone(id){
  const t = state.tasks.find(x => x.id === id);
  t.progress = 100;
  t.status = "done";
  t.updatedAt = todayISO();
  t.logs = t.logs || [];
  t.logs.push({date:todayISO(), by:"齊藤", type:"完了報告", text:"完了として登録。齊藤確認待ち。"});
  save();
}
function addAttachment(id){
  const input = document.getElementById("attachInput");
  const file = input.files[0];
  if(!file) return alert("ファイルを選択してください");
  const reader = new FileReader();
  reader.onload = () => {
    const t = state.tasks.find(x => x.id === id);
    t.attachments = t.attachments || [];
    t.attachments.push({name:file.name, type:file.type, data:reader.result, addedAt:todayISO()});
    t.updatedAt = todayISO();
    t.logs = t.logs || [];
    t.logs.push({date:todayISO(), by:"齊藤", type:"添付", text:`${file.name} を添付。`});
    save();
    openTask(id);
  };
  reader.readAsDataURL(file);
}
function downloadAttachment(id, index){
  const t = state.tasks.find(x => x.id === id);
  const a = t.attachments[index];
  const link = document.createElement("a");
  link.href = a.data;
  link.download = a.name;
  link.target = "_blank";
  link.click();
}
function makeManagerReport(){
  const s = calcStats();
  const lines = [
    "【HDM ToDo 進捗レポート】",
    `全体進捗: ${s.avg}% / 完了: ${s.done}/${s.total}件 / 期限5日以内: ${s.soon}件 / 期限超過: ${s.overdue}件`,
    "",
    "■ 確認が必要な内容"
  ];
  aiInsights().slice(0,8).forEach(i => lines.push(`・${i.title} - ${i.text}`));
  lines.push("", "■ 担当別");
  people.filter(p=>p!=="全員").forEach(p => {
    const mine = state.tasks.filter(t => t.owner === p || t.owner === "全員");
    const ps = calcStats(mine);
    lines.push(`・${p}: 平均進捗${ps.avg}% / 完了${ps.done}/${ps.total}件`);
  });
  return lines.join("\n");
}
function copyReport(){
  const text = document.getElementById("reportText")?.value || makeManagerReport();
  navigator.clipboard.writeText(text).then(()=>alert("報告文をコピーしました"));
}
function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = `hdm-todo-${todayISO()}.json`;
  link.click();
  URL.revokeObjectURL(url);
}
function resetSeed(){
  if(!confirm("初期データに戻しますか？現在の入力内容は上書きされます。")) return;
  state = structuredClone(seedData);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  render();
}
function requestNotifications(){
  if(!("Notification" in window)) return alert("このブラウザは通知に対応していません");
  Notification.requestPermission().then(result => {
    if(result === "granted"){
      new Notification("HDM ToDoアプリ", {body:"通知が有効になりました。期限前アラートの土台ができています。"});
      notifyUrgentTasks();
    }
  });
}
function notifyUrgentTasks(){
  if(!("Notification" in window) || Notification.permission !== "granted") return;
  const urgent = state.tasks.filter(t => t.status !== "done" && dateDiff(t.due) <= 5);
  if(!urgent.length) return;
  const worst = urgent.sort((a,b)=>dateDiff(a.due)-dateDiff(b.due))[0];
  const diff = dateDiff(worst.due);
  const body = diff < 0 ? `${worst.owner}担当「${worst.title}」が期限超過です。` : `${worst.owner}担当「${worst.title}」は期限まであと${diff}日です。`;
  new Notification("期限アラート", {body});
}
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
document.getElementById("newTaskBtn").onclick = openNewTask;
document.getElementById("closeModal").onclick = closeModal;
document.getElementById("modal").onclick = e => { if(e.target.id === "modal") closeModal(); };
document.getElementById("exportBtn").onclick = exportData;
document.getElementById("notifyBtn").onclick = requestNotifications;
render();
loadCloudState();
setInterval(pollCloudState, 10000);
</script>
</body>
